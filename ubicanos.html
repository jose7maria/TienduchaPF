<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Tienduca de LBP — Ubícanos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
<div id="menu_contenedor"></div>
  <!-- BARRA SUPERIOR termina aquí -->

  <!-- BANNER de página -->
  <div class="hero_banner">
    <h1 class="hero_banner__titulo">Ubícanos</h1>
    <p class="hero_banner__subtitulo">Visítanos · Siempre hay algo nuevo</p>
    <div class="hero_banner__linea"></div>
  </div>

  <!-- CONTENIDO UBICANOS desde aquí -->
  <!-- Solo mapa + datos de contacto. Las redes están en el footer. -->
  <section class="seccion_ubicanos">
    <div class="container">
      <h2 class="titulo_seccion">¿Dónde estamos?</h2>

      <!-- Bootstrap: mapa a la izquierda, info a la derecha -->
      <div class="row g-4 align-items-stretch">

        <!-- MAPA de Google -->
        <div class="col-12 col-md-7">
          <div class="mapa_contenedor">
            <!--
              Para usar tu dirección real:
              1. Ve a maps.google.com
              2. Busca tu local
              3. Click en Compartir > Insertar mapa
              4. Copia el src del iframe y reemplázalo aquí
            -->
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3901.0!2d-77.0428!3d-12.0464!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTLCsDAyJzQ3LjAiUyA3N8KwMDInMzQuMSJX!5e0!3m2!1ses!2spe!4v1234567890"
              allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>
        </div>

        <!-- DATOS DE CONTACTO -->
        <div class="col-12 col-md-5">
          <div class="info_contacto">

            <div class="info_contacto__item">
              <span class="info_contacto__icono">📍</span>
              <div class="info_contacto__texto">
                <p>Dirección</p>
                <span>Jr. de la Unión 450, Lima Centro</span>
              </div>
            </div>

            <div class="info_contacto__item">
              <span class="info_contacto__icono">📱</span>
              <div class="info_contacto__texto">
                <p>WhatsApp / Llamadas</p>
                <span>+51 999 888 777</span>
              </div>
            </div>

            <div class="info_contacto__item">
              <span class="info_contacto__icono">📧</span>
              <div class="info_contacto__texto">
                <p>Correo</p>
                <span>lbp@tienduca.pe</span>
              </div>
            </div>

            <div class="info_contacto__item">
              <span class="info_contacto__icono">🕐</span>
              <div class="info_contacto__texto">
                <p>Horario</p>
                <span>Lunes a Sábado · 10am – 7pm</span>
              </div>
            </div>

            <div class="info_contacto__item">
              <span class="info_contacto__icono">🚇</span>
              <div class="info_contacto__texto">
                <p>Cómo llegar</p>
                <span>Metro Línea 1 — Est. La Cultura · 5 min</span>
              </div>
            </div>

          </div>
        </div>

      </div>
      <!-- FIN row mapa -->

      <!--
        Las redes sociales ya están en el footer de abajo.
        No las repetimos aquí para no duplicar información.
      -->

    </div>
  </section>
  <!-- CONTENIDO UBICANOS termina aquí -->


  <!-- FOOTER: JS lo llena automáticamente -->
  <footer class="pie_pagina" id="pie_pagina"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
